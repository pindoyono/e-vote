# FrankenPHP Caddyfile configuration for e-vote without domain (IP-based)
# File: /etc/frankenphp/Caddyfile

:80 {
    # Reverse proxy to Next.js application
    reverse_proxy localhost:3000 {
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
        header_up Host {host}
        
        # Health check
        health_uri /
        health_interval 30s
        health_timeout 5s
    }
    
    # Security headers
    header {
        # XSS Protection
        X-Content-Type-Options "nosniff"
        X-Frame-Options "SAMEORIGIN"
        X-XSS-Protection "1; mode=block"
        # CSP for e-voting app
        Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';"
        # Remove server info
        -Server
        # Referrer Policy
        Referrer-Policy "strict-origin-when-cross-origin"
    }
    
    # Rate limiting for API endpoints
    rate_limit {
        zone vote_api {
            key {remote_host}
            events 15
            window 1m
        }
        
        rate_limit /api/vote/* vote_api
        rate_limit /api/auth/* vote_api
    }
    
    # File upload limit for Excel imports
    request_body {
        max_size 10MB
    }
    
    # Caching for static assets
    @static {
        path /_next/static/* /public/* /favicon.ico
    }
    header @static {
        Cache-Control "public, max-age=86400"
    }
    
    # Compression
    encode gzip zstd
    
    # Logging
    log {
        output file /var/log/frankenphp/e-vote-access.log {
            roll_size 100MB
            roll_keep 3
        }
        format json {
            time_format "iso8601"
            message_key "msg"
        }
        level INFO
    }
    
    # Error handling
    handle_errors {
        @4xx expression `{http.error.status_code} >= 400 && {http.error.status_code} < 500`
        @5xx expression `{http.error.status_code} >= 500`
        
        respond @4xx "Client Error: {http.error.status_code}" {http.error.status_code}
        respond @5xx "Server Error: {http.error.status_code}" {http.error.status_code}
    }
}